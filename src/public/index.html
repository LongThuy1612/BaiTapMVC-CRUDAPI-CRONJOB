<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Management</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>User Management</h1>
      <button id="btn-open-create" class="btn btn-primary">+ Thêm user</button>
    </header>

    <div id="alert" class="alert hidden"></div>

    <table id="user-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Họ tên</th>
          <th>Email</th>
          <th>Tuổi</th>
          <th>Trạng thái</th>
          <th>Thao tác</th>
        </tr>
      </thead>
      <tbody id="user-tbody">
        <tr><td colspan="6" class="loading">Đang tải...</td></tr>
      </tbody>
    </table>
  </div>

  <!-- Modal -->
  <div id="modal" class="modal hidden">
    <div class="modal-box">
      <h2 id="modal-title">Thêm user</h2>
      <form id="user-form">
        <input type="hidden" id="user-id" />
        <div class="field">
          <label>Họ tên <span class="required">*</span></label>
          <input type="text" id="full_name" placeholder="Nguyễn Văn A" />
        </div>
        <div class="field">
          <label>Email <span class="required">*</span></label>
          <input type="email" id="email" placeholder="a@gmail.com" />
        </div>
        <div class="field">
          <label>Tuổi</label>
          <input type="number" id="age" placeholder="20" min="0" />
        </div>
        <div class="field">
          <label>Trạng thái</label>
          <select id="status">
            <option value="active">Active</option>
            <option value="inactive">Inactive</option>
          </select>
        </div>
        <div class="modal-actions">
          <button type="button" id="btn-cancel" class="btn btn-secondary">Hủy</button>
          <button type="submit" id="btn-submit" class="btn btn-primary">Lưu</button>
        </div>
      </form>
    </div>
  </div>

  <script src="users.js"></script>
</body>
</html>
